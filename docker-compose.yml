services:
  app:
    build:
      context: ..           # IMS/ — gives Docker access to both ims_app/ and thermo/
      dockerfile: ims_app/Dockerfile
    ports:
      - "7432:8000"       # access at http://<imac-ip>:7432
    volumes:
      - app_data:/app/data  # SQLite DB + uploaded case files
    restart: unless-stopped
    environment:
      # No CORS needed — frontend and API are served from the same origin.
      CORS_ORIGINS: ""

volumes:
  app_data:
